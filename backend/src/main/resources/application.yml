spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none # Minimiza as categorias (Relatórios, Usuários, etc.)
    default-models-expand-depth: 0 # Minimiza a seção "Schemas" no rodapé
    default-model-expand-depth: 0 # Minimiza a visualização do modelo dentro dos endpoints